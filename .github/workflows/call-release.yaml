name: Call Release

on:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #builds and deploys libs to github packages
  call-workflow-ci-build-publish-lib:
    uses: felleslosninger/github-workflows/.github/workflows/ci-build-publish-lib.yml@main
    permissions:
      contents: write
      repository-projects: read
      packages: write
    with:
      package-version: ${{ github.event.release.tag_name }}
      deployment-repository: ${{ github.repository }}
      java-version: 25
      sbom-path: ./
      module-name: integrasjonspunkt
    secrets: inherit

  build-and-deploy-image:
    #builds and deploys docker image to Github Packages Container Registry
    needs: call-workflow-ci-build-publish-lib
    uses: felleslosninger/github-workflows/.github/workflows/ci-build-publish-image.yml@main
    permissions:
      contents: write
      repository-projects: read
      packages: write
      id-token: write
    with:
      image-tag: ${{ github.event.release.tag_name }}
      module-name: integrasjonspunkt
      cr-type: ghcr
      slack-channel-id: C05NLQCFR41
      java-version: 25
    secrets: inherit
