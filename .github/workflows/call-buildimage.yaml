name: CI Workflow

on:
  workflow_dispatch:
  push:
  pull_request:
    types: [ ] # Empty list ensures PRs are not triggered. Trigger nytt bygg....

jobs:
  #also deploys to maven central/ossrh
  build-and-deploy-libs:
    uses: felleslosninger/github-workflows/.github/workflows/ci-efm-integrasjonspunkt-publish-ossrh.yml@MOVE-4223-publish-public-image
    with:
      java-version: 8
      profile: ossrh
      sbom-path: integrasjonspunkt/target
      fetch-depth: 0
    secrets: inherit

  build-and-deploy-image:
    needs: build-and-deploy-libs
    uses: felleslosninger/github-workflows/.github/workflows/ci-spring-boot-build-publish-public-image.yml@MOVE-4223-publish-public-image
    with:
      slack-channel-id : C05NLQCFR41
      java-version: 8
      update-versions: "false"
      fetch-depth: 0
    secrets: inherit
