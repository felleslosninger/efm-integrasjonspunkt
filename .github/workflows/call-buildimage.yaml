name: Release Integrasjonspunkt v2.x

on:
  release:
    types:
      - created

jobs:
  build-and-deploy-libs:
    uses: felleslosninger/github-workflows/.github/workflows/ci-maven-install-deploy-lib.yml@main
    with:
      java-version: 8
      sbom-path: integrasjonspunkt/target
      fetch-depth: 0
      application-path: integrasjonspunkt/
      package-version: ${{ github.event.release.tag_name }}
    secrets: inherit

  build-and-deploy-image:
    needs: build-and-deploy-libs
    uses: felleslosninger/github-workflows/.github/workflows/ci-docker-build-publish-integrasjonspunkt.yml@MOVE-4941-ipv2-pipeline
    with:
      slack-channel-id: C05NLQCFR41
      package-version: ${{ github.event.release.tag_name }}
      java-version: 8
      fetch-depth: 0
    secrets: inherit

